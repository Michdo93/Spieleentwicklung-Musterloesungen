<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Ninja Fight – Kapitel 18: Highscores & Levelfortschritt</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <div id="outer-wrapper">
    <div id="screen-game" class="screen">
      <div id="stage-wrapper">
        <canvas id="stage" width="1024" height="576"></canvas>
        <div id="hud">
          <span id="hud-life">Leben: 10/10</span>
          <span id="hud-weapons"></span>
          <span id="hud-points">Punkte: 0</span>
          <span id="hud-time">Level 1</span>
        </div>
      </div>
      <div id="level-controls">
        <button id="btn-level1">Level 1</button>
        <button id="btn-level2">Level 2</button>
      </div>
      <div id="enemy-hp-list"></div>
    </div>

    <div id="screen-start" class="screen active">
      <h1>Ninja Fight</h1>
      <button id="btn-play">Start</button>
    </div>

    <div id="screen-pause" class="screen">
      <h2>Pause</h2>
      <button id="btn-resume">Weiter (oder ESC)</button>
    </div>

    <div id="screen-end" class="screen">
      <h2 id="end-title">Game Over</h2>
      <p id="end-points"></p>
      <input id="score-name" placeholder="Dein Name" maxlength="16">
      <button id="btn-send-score">Punktestand speichern</button>
      <pre id="highscore-list"></pre>
      <button id="btn-restart">Neustart</button>
    </div>
  </div>

  <script src="assets/js/main.js"></script>
</body>
</html>
