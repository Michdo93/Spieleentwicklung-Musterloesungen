<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Ninja Fight – Kapitel 18: Highscores & Levelfortschritt</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <div id="stage-wrapper">
    <div id="screen-game" class="screen">
      <div id="game">
        <canvas id="stage" width="1024" height="576"></canvas>

        <div id="hud">
          <span id="hud-life">❤ 10</span>
          <span id="hud-weapons"></span>
          <span id="hud-points">Punkte: 0</span>
          <span id="hud-time">0:00</span>
        </div>
      </div>
    </div>

    <div id="screen-start" class="screen active">
      <h1>Ninja Fight</h1>
      <button id="btn-play">Start</button>
    </div>

    <div id="screen-pause" class="screen">
      <h2>Pause</h2>
      <button id="btn-resume">Weiter (oder ESC)</button>
    </div>

    <div id="screen-gameover" class="screen">
      <h2>Game Over</h2>
      <p id="go-points"></p>
      <input id="go-name" placeholder="Dein Name" maxlength="16">
      <button id="btn-send-score">Punktestand speichern</button>
      <pre id="highscore-list"></pre>
      <button id="btn-restart">Neustart</button>
    </div>
  </div>

  <script src="assets/js/main.js"></script>
</body>
</html>
