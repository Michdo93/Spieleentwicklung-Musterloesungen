<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Kapitel 15 – Sound &amp; Musik</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Kapitel 15 – Sound &amp; Musik</h1>
  <div class="panel">
    <button id="btn-menu">Menü-Musik</button>
    <button id="btn-game">Spiel-Musik</button>
    <button id="btn-stop">Stopp</button>
  </div>
  <div class="panel">
    <button id="btn-sfx">Soundeffekt (mehrfach schnell klicken!)</button>
  </div>
  <div class="panel">
    <label>Lautstärke: <input type="range" id="volume" min="0" max="100" value="60"></label>
  </div>
  <p id="hint">Menü- und Spielmusik schließen sich gegenseitig aus. Der Soundeffekt lässt sich beliebig oft schnell hintereinander auslösen.</p>

  <script src="script.js"></script>
</body>
</html>
